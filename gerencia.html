<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerencia | A B R I L &amp; O N E</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --marfil: #FAF5EF;
      --negro: #1A1A1A;
      --negro-light: #2D2D2D;
      --rosa: #C6AAAA;
      --rosa-dark: #B09090;
      --rosa-light: #E0D0D0;
      --gris: #6B6B6B;
      --gris-light: #A0A0A0;
      --verde: #27ae60;
      --amarillo: #f39c12;
      --rojo: #e74c3c;
      --azul: #3498db;
      --font-display: 'Cormorant Garamond', serif;
      --font-body: 'Montserrat', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); background: #f0ebe5; color: var(--negro-light); min-height: 100vh; }

    /* HEADER */
    .dash-header {
      background: var(--negro);
      color: var(--marfil);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .dash-header h1 {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 400;
      letter-spacing: 5px;
    }
    .dash-header h1 span { color: var(--rosa); }
    .dash-header-right { display: flex; gap: 12px; align-items: center; }
    .dash-header-right span { font-size: 0.75rem; color: var(--gris-light); }
    .dash-btn {
      padding: 8px 20px;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      color: var(--marfil);
      background: transparent;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font-body);
    }
    .dash-btn:hover { background: rgba(255,255,255,0.1); }
    .dash-btn-danger { border-color: var(--rojo); color: var(--rojo); }
    .dash-btn-danger:hover { background: rgba(231,76,60,0.15); }

    /* MAIN */
    .dash-main { padding: 28px 32px; max-width: 1400px; margin: 0 auto; }

    /* KPI CARDS */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }
    .kpi-card {
      background: white;
      border-radius: 10px;
      padding: 22px 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    .kpi-label {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gris);
      margin-bottom: 8px;
    }
    .kpi-value {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 600;
      color: var(--negro);
      line-height: 1;
    }
    .kpi-sub {
      font-size: 0.72rem;
      color: var(--gris-light);
      margin-top: 6px;
    }
    .kpi-value.green { color: var(--verde); }
    .kpi-value.blue { color: var(--azul); }
    .kpi-value.rosa { color: var(--rosa-dark); }

    /* SECTIONS */
    .dash-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    .dash-grid-3 { grid-template-columns: 1fr 1fr 1fr; }
    .dash-card {
      background: white;
      border-radius: 10px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    .dash-card-full { grid-column: 1 / -1; }
    .dash-card h2 {
      font-family: var(--font-display);
      font-size: 1.15rem;
      font-weight: 500;
      color: var(--negro);
      letter-spacing: 1px;
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }

    /* TABLES */
    .dash-table { width: 100%; border-collapse: collapse; }
    .dash-table th {
      text-align: left;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gris);
      padding: 8px 12px;
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }
    .dash-table td {
      font-size: 0.82rem;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(0,0,0,0.04);
      color: var(--negro-light);
    }
    .dash-table tr:last-child td { border-bottom: none; }
    .dash-table tr:hover td { background: rgba(0,0,0,0.01); }

    /* BADGES */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 50px;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .badge-green { background: rgba(39,174,96,0.1); color: var(--verde); }
    .badge-yellow { background: rgba(243,156,18,0.1); color: var(--amarillo); }
    .badge-blue { background: rgba(52,152,219,0.1); color: var(--azul); }
    .badge-rosa { background: rgba(198,170,170,0.15); color: var(--rosa-dark); }

    /* BAR CHART */
    .bar-chart { display: flex; flex-direction: column; gap: 10px; }
    .bar-row { display: flex; align-items: center; gap: 12px; }
    .bar-label {
      width: 120px;
      font-size: 0.78rem;
      color: var(--negro-light);
      text-align: right;
      flex-shrink: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .bar-track {
      flex: 1;
      height: 24px;
      background: rgba(0,0,0,0.04);
      border-radius: 4px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--rosa), var(--rosa-dark));
      border-radius: 4px;
      display: flex;
      align-items: center;
      padding-left: 8px;
      min-width: 30px;
      transition: width 0.6s ease;
    }
    .bar-fill span {
      font-size: 0.65rem;
      font-weight: 600;
      color: white;
    }

    /* HOURS CHART */
    .hours-chart {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 120px;
      padding-top: 10px;
    }
    .hour-bar {
      flex: 1;
      background: var(--rosa-light);
      border-radius: 3px 3px 0 0;
      position: relative;
      min-height: 4px;
      transition: height 0.4s ease;
    }
    .hour-bar:hover { background: var(--rosa-dark); }
    .hour-bar-label {
      position: absolute;
      bottom: -18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.55rem;
      color: var(--gris-light);
    }

    /* EMPTY STATE */
    .dash-empty {
      text-align: center;
      padding: 40px;
      color: var(--gris-light);
      font-size: 0.88rem;
    }

    /* MONEY */
    .money-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .money-card {
      background: rgba(0,0,0,0.02);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }
    .money-card-label {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--gris);
      margin-bottom: 6px;
    }
    .money-card-value {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 600;
    }

    /* RESPONSIVE */
    @media (max-width: 1024px) {
      .kpi-grid { grid-template-columns: repeat(3, 1fr); }
      .dash-grid { grid-template-columns: 1fr; }
      .dash-grid-3 { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
      .dash-main { padding: 16px; }
      .dash-header { padding: 16px; flex-wrap: wrap; gap: 10px; }
      .money-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 480px) {
      .kpi-grid { grid-template-columns: 1fr; }
    }

    /* EMAIL MODAL */
    .email-modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 3000;
      display: none;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(3px);
    }
    .email-modal-overlay.active { display: flex; }
    .email-modal {
      background: white;
      border-radius: 12px;
      width: 560px;
      max-width: 92vw;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    .email-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .email-modal-header h3 {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 500;
      letter-spacing: 1px;
      color: var(--negro);
    }
    .email-modal-close {
      background: none; border: none; cursor: pointer;
      font-size: 1.3rem; color: var(--gris); padding: 4px 8px;
    }
    .email-modal-close:hover { color: var(--negro); }
    .email-modal-body { padding: 24px; }
    .email-field { margin-bottom: 16px; }
    .email-field label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gris);
      margin-bottom: 6px;
    }
    .email-field input, .email-field textarea, .email-field select {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid rgba(0,0,0,0.1);
      border-radius: 6px;
      font-family: var(--font-body);
      font-size: 0.88rem;
      color: var(--negro);
      background: #fafafa;
      outline: none;
      transition: border-color 0.2s;
    }
    .email-field input:focus, .email-field textarea:focus, .email-field select:focus {
      border-color: var(--rosa);
    }
    .email-field textarea { min-height: 160px; resize: vertical; line-height: 1.6; }
    .email-modal-footer {
      padding: 16px 24px 24px;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    .email-send-btn {
      padding: 12px 32px;
      background: var(--rosa);
      color: white;
      border: none;
      border-radius: 6px;
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }
    .email-send-btn:hover { background: var(--rosa-dark); }
    .email-cancel-btn {
      padding: 12px 24px;
      background: transparent;
      color: var(--gris);
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 6px;
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .email-cancel-btn:hover { border-color: var(--negro); color: var(--negro); }

    /* Clickable email in tables */
    .email-link {
      color: var(--rosa-dark);
      cursor: pointer;
      text-decoration: underline;
      font-weight: 500;
    }
    .email-link:hover { color: var(--negro); }

    /* New email button */
    .dash-btn-email { border-color: var(--rosa); color: var(--rosa); }
    .dash-btn-email:hover { background: rgba(198,170,170,0.15); }
  </style>
</head>
<body>

  <header class="dash-header">
    <h1>A B R I L &nbsp; <span>&</span> &nbsp; O N E &nbsp; — &nbsp; GERENCIA</h1>
    <div class="dash-header-right">
      <span id="dashDate"></span>
      <button class="dash-btn dash-btn-email" onclick="openEmailModal()">✉ Nuevo Correo</button>
      <button class="dash-btn" onclick="location.href='index.html'">Ir a la Web</button>
      <button class="dash-btn" onclick="refreshDash()">Actualizar</button>
      <button class="dash-btn dash-btn-danger" onclick="if(confirm('¿Borrar todos los datos de analytics?')){AO_ANALYTICS.resetDB();refreshDash();}">Reset</button>
    </div>
  </header>

  <main class="dash-main">

    <!-- KPIs -->
    <div class="kpi-grid" id="kpiGrid"></div>

    <!-- INGRESOS / CUENTAS -->
    <div class="dash-grid">
      <div class="dash-card">
        <h2>Cuentas e Ingresos</h2>
        <div class="money-grid" id="moneyGrid"></div>
        <div id="pedidosPorMetodo"></div>
      </div>
      <div class="dash-card">
        <h2>Actividad por Hora</h2>
        <div class="hours-chart" id="hoursChart"></div>
        <div style="height: 24px;"></div>
      </div>
    </div>

    <!-- PRODUCTOS & CATEGORÍAS -->
    <div class="dash-grid">
      <div class="dash-card">
        <h2>Productos Más Agregados al Carrito</h2>
        <div id="topProductos"></div>
      </div>
      <div class="dash-card">
        <h2>Categorías Más Visitadas</h2>
        <div id="topCategorias"></div>
      </div>
    </div>

    <!-- PÁGINAS VISITADAS & SUSCRIPCIONES -->
    <div class="dash-grid">
      <div class="dash-card">
        <h2>Páginas Más Visitadas</h2>
        <div id="topPaginas"></div>
      </div>
      <div class="dash-card">
        <h2>Suscripciones al Newsletter</h2>
        <div id="suscripcionesTable"></div>
      </div>
    </div>

    <!-- PEDIDOS -->
    <div class="dash-grid">
      <div class="dash-card dash-card-full">
        <h2>Historial de Pedidos</h2>
        <div id="pedidosTable"></div>
      </div>
    </div>

    <!-- ÚLTIMAS VISITAS -->
    <div class="dash-grid">
      <div class="dash-card dash-card-full">
        <h2>Últimas Visitas</h2>
        <div id="visitasTable"></div>
      </div>
    </div>

  </main>

  <!-- EMAIL MODAL -->
  <div class="email-modal-overlay" id="emailOverlay" onclick="if(event.target===this)closeEmailModal()">
    <div class="email-modal">
      <div class="email-modal-header">
        <h3>Enviar Correo</h3>
        <button class="email-modal-close" onclick="closeEmailModal()">×</button>
      </div>
      <div class="email-modal-body">
        <div class="email-field">
          <label>Para</label>
          <input type="email" id="emailTo" placeholder="correo@ejemplo.com">
        </div>
        <div class="email-field">
          <label>Plantilla rápida</label>
          <select id="emailTemplate" onchange="applyTemplate()">
            <option value="">— Escribir desde cero —</option>
            <option value="bienvenida">Bienvenida a A B R I L & O N E</option>
            <option value="pedido_confirmado">Confirmación de pedido</option>
            <option value="pedido_envio">Producto en camino</option>
            <option value="pago_pendiente">Recordatorio de pago pendiente (Crédito ONE)</option>
            <option value="entrega">Coordinación de punto de encuentro</option>
            <option value="promocion">Promoción especial</option>
          </select>
        </div>
        <div class="email-field">
          <label>Asunto</label>
          <input type="text" id="emailSubject" placeholder="Asunto del correo">
        </div>
        <div class="email-field">
          <label>Mensaje</label>
          <textarea id="emailBody" placeholder="Escribe tu mensaje aquí..."></textarea>
        </div>
      </div>
      <div class="email-modal-footer">
        <button class="email-cancel-btn" onclick="closeEmailModal()">Cancelar</button>
        <button class="email-send-btn" onclick="sendEmail()">Enviar Correo</button>
      </div>
    </div>
  </div>

  <script src="js/analytics.js"></script>
  <script>
    function refreshDash() {
      const stats = AO_ANALYTICS.getEstadisticas();

      // Fecha
      document.getElementById('dashDate').textContent = new Date().toLocaleDateString('es-HN', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });

      // KPIs
      document.getElementById('kpiGrid').innerHTML = `
        <div class="kpi-card">
          <div class="kpi-label">Visitas Totales</div>
          <div class="kpi-value">${stats.totalVisitas}</div>
          <div class="kpi-sub">${stats.visitasHoy} hoy</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Visitas (7 días)</div>
          <div class="kpi-value blue">${stats.visitasUltimos7}</div>
          <div class="kpi-sub">Última semana</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Suscriptores</div>
          <div class="kpi-value rosa">${stats.totalSuscripciones}</div>
          <div class="kpi-sub">Newsletter</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Pedidos</div>
          <div class="kpi-value">${stats.totalPedidos}</div>
          <div class="kpi-sub">${stats.pedidosCredito} crédito / ${stats.pedidosPago} completo</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Ingresos Totales</div>
          <div class="kpi-value green">L. ${stats.ingresos.total.toLocaleString('es-HN')}</div>
          <div class="kpi-sub">${stats.totalProductosAgregados} productos agregados</div>
        </div>
      `;

      // MONEY
      document.getElementById('moneyGrid').innerHTML = `
        <div class="money-card">
          <div class="money-card-label">Ingresos Totales</div>
          <div class="money-card-value" style="color:var(--verde)">L. ${stats.ingresos.total.toLocaleString('es-HN')}</div>
        </div>
        <div class="money-card">
          <div class="money-card-label">Vía Crédito ONE</div>
          <div class="money-card-value" style="color:var(--amarillo)">L. ${stats.ingresos.creditoONE.toLocaleString('es-HN')}</div>
        </div>
        <div class="money-card">
          <div class="money-card-label">Pago Completo</div>
          <div class="money-card-value" style="color:var(--azul)">L. ${stats.ingresos.pagoCompleto.toLocaleString('es-HN')}</div>
        </div>
      `;

      // HOURS CHART
      const hoursEl = document.getElementById('hoursChart');
      const maxHour = Math.max(...Object.values(stats.visitasPorHora), 1);
      let hoursHTML = '';
      for (let h = 0; h < 24; h++) {
        const count = stats.visitasPorHora[h] || 0;
        const pct = (count / maxHour) * 100;
        hoursHTML += `<div class="hour-bar" style="height:${Math.max(pct, 3)}%" title="${h}:00 — ${count} visitas"><span class="hour-bar-label">${h}</span></div>`;
      }
      hoursEl.innerHTML = hoursHTML;

      // TOP PRODUCTOS
      const topProdEl = document.getElementById('topProductos');
      if (stats.productosMasVendidos.length === 0) {
        topProdEl.innerHTML = '<div class="dash-empty">Sin datos aún</div>';
      } else {
        const maxProd = stats.productosMasVendidos[0]?.veces || 1;
        topProdEl.innerHTML = '<div class="bar-chart">' + stats.productosMasVendidos.slice(0, 8).map(p => `
          <div class="bar-row">
            <div class="bar-label">${p.nombre}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${(p.veces/maxProd)*100}%"><span>${p.veces}</span></div></div>
          </div>
        `).join('') + '</div>';
      }

      // TOP CATEGORÍAS
      const topCatEl = document.getElementById('topCategorias');
      if (stats.categoriasRank.length === 0) {
        topCatEl.innerHTML = '<div class="dash-empty">Sin datos aún</div>';
      } else {
        const maxCat = stats.categoriasRank[0]?.vistas || 1;
        topCatEl.innerHTML = '<div class="bar-chart">' + stats.categoriasRank.map(c => `
          <div class="bar-row">
            <div class="bar-label" style="text-transform:capitalize">${c.categoria}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${(c.vistas/maxCat)*100}%"><span>${c.vistas}</span></div></div>
          </div>
        `).join('') + '</div>';
      }

      // TOP PÁGINAS
      const topPagEl = document.getElementById('topPaginas');
      if (stats.paginasRank.length === 0) {
        topPagEl.innerHTML = '<div class="dash-empty">Sin datos aún</div>';
      } else {
        const maxPag = stats.paginasRank[0]?.vistas || 1;
        topPagEl.innerHTML = '<div class="bar-chart">' + stats.paginasRank.map(p => `
          <div class="bar-row">
            <div class="bar-label">${p.pagina}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${(p.vistas/maxPag)*100}%"><span>${p.vistas}</span></div></div>
          </div>
        `).join('') + '</div>';
      }

      // SUSCRIPCIONES
      const susEl = document.getElementById('suscripcionesTable');
      if (stats.suscripciones.length === 0) {
        susEl.innerHTML = '<div class="dash-empty">Sin suscripciones aún</div>';
      } else {
        susEl.innerHTML = `<table class="dash-table">
          <thead><tr><th>Correo</th><th>Fecha</th><th>Fuente</th></tr></thead>
          <tbody>${stats.suscripciones.slice().reverse().map(s => `
            <tr>
              <td><span class="email-link" onclick="openEmailModal('${s.email}')">${s.email}</span></td>
              <td>${new Date(s.fecha).toLocaleDateString('es-HN')} ${new Date(s.fecha).toLocaleTimeString('es-HN', {hour:'2-digit',minute:'2-digit'})}</td>
              <td><span class="badge badge-blue">${s.fuente}</span></td>
            </tr>
          `).join('')}</tbody>
        </table>`;
      }

      // PEDIDOS
      const pedEl = document.getElementById('pedidosTable');
      if (stats.pedidos.length === 0) {
        pedEl.innerHTML = '<div class="dash-empty">Sin pedidos aún</div>';
      } else {
        pedEl.innerHTML = `<table class="dash-table">
          <thead><tr><th>ID</th><th>Fecha</th><th>Productos</th><th>Método</th><th>Pago Inicial</th><th>Pendiente</th><th>Total</th><th>Estado</th></tr></thead>
          <tbody>${stats.pedidos.slice().reverse().map(p => `
            <tr>
              <td><strong>${p.id}</strong></td>
              <td>${new Date(p.fecha).toLocaleDateString('es-HN')}</td>
              <td>${p.productos.map(pr => pr.nombre).join(', ')}</td>
              <td><span class="badge ${p.metodoPago === 'Crédito ONE' ? 'badge-rosa' : 'badge-blue'}">${p.metodoPago}</span></td>
              <td>L. ${p.pagoInicial.toLocaleString('es-HN')}</td>
              <td>${p.pagoPendiente > 0 ? 'L. ' + p.pagoPendiente.toLocaleString('es-HN') : '—'}</td>
              <td><strong>L. ${p.total.toLocaleString('es-HN')}</strong></td>
              <td><span class="badge ${p.estado === 'Pagado' ? 'badge-green' : 'badge-yellow'}">${p.estado}</span></td>
            </tr>
          `).join('')}</tbody>
        </table>`;
      }

      // ÚLTIMAS VISITAS
      const visEl = document.getElementById('visitasTable');
      if (stats.ultimasVisitas.length === 0) {
        visEl.innerHTML = '<div class="dash-empty">Sin visitas registradas</div>';
      } else {
        visEl.innerHTML = `<table class="dash-table">
          <thead><tr><th>Fecha</th><th>Hora</th><th>Página</th><th>Categoría</th><th>Origen</th></tr></thead>
          <tbody>${stats.ultimasVisitas.map(v => `
            <tr>
              <td>${v.dia}</td>
              <td>${v.hora}</td>
              <td><span class="badge badge-blue">${v.pagina}</span></td>
              <td>${v.categoria ? '<span class="badge badge-rosa">' + v.categoria + '</span>' : '—'}</td>
              <td style="font-size:0.72rem;color:var(--gris-light);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${v.referrer}</td>
            </tr>
          `).join('')}</tbody>
        </table>`;
      }
    }

    // ---- EMAIL MODAL ----
    const EMAIL_TEMPLATES = {
      bienvenida: {
        subject: '¡Bienvenida a A B R I L & O N E! ✨',
        body: 'Hola,\n\n¡Gracias por unirte a la comunidad de A B R I L & O N E!\n\nEstamos encantadas de tenerte con nosotros. Descubre nuestra colección de maquillaje premium: labiales, rímel, sombras y delineadores diseñados para realzar tu belleza natural.\n\nVisita nuestra web para conocer nuestros productos y aprovecha nuestro sistema de Crédito ONE: paga 50% al hacer tu pedido y 50% 24h antes de recibirlo.\n\n¡Bienvenida!\nEquipo A B R I L & O N E\nmakeupdeabril@gmail.com'
      },
      pedido_confirmado: {
        subject: 'Tu pedido con A B R I L & O N E ha sido confirmado',
        body: 'Hola,\n\n¡Tu pedido ha sido confirmado exitosamente!\n\nDetalles:\n- Número de pedido: [NÚMERO]\n- Productos: [PRODUCTOS]\n- Total: L. [TOTAL]\n- Método de pago: [MÉTODO]\n\nTiempo estimado de entrega: 18 a 25 días hábiles.\n\nTe mantendremos informada sobre el estado de tu pedido.\n\n¡Gracias por tu compra!\nEquipo A B R I L & O N E'
      },
      pedido_envio: {
        subject: '¡Tu pedido está en camino! — A B R I L & O N E',
        body: 'Hola,\n\n¡Buenas noticias! Tu pedido [NÚMERO] ya está en camino a Honduras.\n\nTe contactaremos pronto para coordinar el punto de encuentro para la entrega.\n\nRecuerda que la entrega se realiza en puntos de encuentro en Tegucigalpa.\n\n¡Gracias por tu paciencia!\nEquipo A B R I L & O N E'
      },
      pago_pendiente: {
        subject: 'Recordatorio: Pago pendiente — Crédito ONE',
        body: 'Hola,\n\nTe recordamos que tienes un pago pendiente por tu pedido [NÚMERO] con Crédito ONE.\n\n- Monto pendiente: L. [MONTO]\n- Fecha límite: 24 horas antes de la entrega\n\nPor favor, realiza tu pago para que podamos coordinar la entrega de tu pedido.\n\nRecuerda: según nuestras políticas, si el segundo pago no se completa, el primer pago del 50% no es reembolsable por gastos operativos.\n\n¿Tienes dudas? Escríbenos a makeupdeabril@gmail.com\n\nEquipo A B R I L & O N E'
      },
      entrega: {
        subject: 'Coordinación de entrega — A B R I L & O N E',
        body: 'Hola,\n\n¡Tu pedido [NÚMERO] está listo para entrega!\n\nNecesitamos coordinar contigo el punto de encuentro:\n\n- Fecha propuesta: [FECHA]\n- Hora propuesta: [HORA]\n- Zona: [ZONA DE TEGUCIGALPA]\n\nPor favor confírmanos si esta fecha y hora te funcionan, o sugiérenos una alternativa.\n\nRecuerda traer tu comprobante de pago.\n\n¡Nos vemos pronto!\nEquipo A B R I L & O N E'
      },
      promocion: {
        subject: '¡Oferta especial solo para ti! — A B R I L & O N E',
        body: 'Hola,\n\n¡Tenemos algo especial para ti!\n\n[DESCRIBE LA PROMOCIÓN]\n\nAprovecha esta oferta por tiempo limitado. Visita nuestra web o escríbenos para hacer tu pedido.\n\nRecuerda que puedes usar nuestro Crédito ONE: 50% ahora y 50% antes de recibir.\n\n¡No te lo pierdas!\nEquipo A B R I L & O N E\nmakeupdeabril@gmail.com'
      }
    };

    function openEmailModal(toEmail) {
      document.getElementById('emailOverlay').classList.add('active');
      document.getElementById('emailTo').value = toEmail || '';
      document.getElementById('emailSubject').value = '';
      document.getElementById('emailBody').value = '';
      document.getElementById('emailTemplate').value = '';
      if (toEmail) document.getElementById('emailSubject').focus();
      else document.getElementById('emailTo').focus();
    }

    function closeEmailModal() {
      document.getElementById('emailOverlay').classList.remove('active');
    }

    function applyTemplate() {
      const sel = document.getElementById('emailTemplate').value;
      if (!sel || !EMAIL_TEMPLATES[sel]) return;
      document.getElementById('emailSubject').value = EMAIL_TEMPLATES[sel].subject;
      document.getElementById('emailBody').value = EMAIL_TEMPLATES[sel].body;
    }

    function sendEmail() {
      const to = document.getElementById('emailTo').value.trim();
      const subject = document.getElementById('emailSubject').value.trim();
      const body = document.getElementById('emailBody').value.trim();

      if (!to) { alert('Ingresa un correo de destino'); return; }
      if (!subject) { alert('Ingresa un asunto'); return; }
      if (!body) { alert('Escribe un mensaje'); return; }

      // Abrir cliente de correo con datos pre-llenados
      const mailtoLink = 'mailto:' + encodeURIComponent(to) +
        '?subject=' + encodeURIComponent(subject) +
        '&body=' + encodeURIComponent(body);
      window.open(mailtoLink, '_blank');

      // Registrar en analytics
      const db = AO_ANALYTICS.getDB();
      if (!db.correosEnviados) db.correosEnviados = [];
      db.correosEnviados.push({
        para: to,
        asunto: subject,
        fecha: new Date().toISOString()
      });
      AO_ANALYTICS.save(db);

      closeEmailModal();
      alert('Correo preparado para: ' + to);
      refreshDash();
    }

    // Init
    refreshDash();
    // Auto-refresh cada 30 segundos
    setInterval(refreshDash, 30000);
  </script>
</body>
</html>
